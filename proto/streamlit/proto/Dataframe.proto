syntax = "proto3";

import "streamlit/proto/ArrowData.proto";

// Proto message for st.dataframe and st.data_editor elements.
message Dataframe {
  // The Arrow data to display
  ArrowData arrow_data = 1;

  // The id of the widget, this is required if the dataframe is editable
  string id = 2;
  // Column configuration as JSON
  string columns = 3;
  // Activate table editing
  EditingMode editing_mode = 4;
  // Deactivates editing
  bool disabled = 5;
  // The form ID of the widget, this is required if the dataframe is editable
  string form_id = 6;
  // Defines the order in which columns are displayed
  repeated string column_order = 7;
  // Activated dataframe selections events
  repeated SelectionMode selection_mode = 8;
  // Row height in pixels
  optional uint32 row_height = 9;
  // Placeholder string used when rendering missing values (e.g. nulls, NaNs).
  optional string placeholder = 10;
  // Selection state (JSON serialized), set when selection is changed programmatically
  // via session state. When present, frontend applies this selection.
  // When absent, frontend manages its own selection state.
  optional string selection_state = 11;
  // Default selection state (JSON serialized), set when selection_default is provided.
  // Applied by the frontend only when there is no stored selection state.
  optional string selection_default = 12;

  // Available editing modes:
  enum EditingMode {
    READ_ONLY = 0; // Read-only table.
    FIXED = 1; // Activates editing but only allow editing of existing cells.
    DYNAMIC = 2; // Activates editing and allow adding & deleting rows.
    ADD_ONLY = 3; // Activates editing and allow adding rows (no deleting).
    DELETE_ONLY = 4; // Activates editing and allow deleting rows (no adding).
  }

  // Available selection modes:
  enum SelectionMode {
    SINGLE_ROW = 0; // Only one row can be selected at a time.
    MULTI_ROW = 1; // Multiple rows can be selected at a time.
    SINGLE_COLUMN = 2; // Only one column can be selected at a time.
    MULTI_COLUMN = 3; // Multiple columns can be selected at a time.
    SINGLE_CELL = 4; // Only one cell can be selected at a time.
    MULTI_CELL = 5; // Multiple cells (continuous range) can be selected.
    SINGLE_ROW_REQUIRED = 6; // Single row, cannot be cleared (radio-like behavior).
  }
}
