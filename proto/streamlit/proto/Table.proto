syntax = "proto3";

import "streamlit/proto/ArrowData.proto";

// Proto message for st.table element.
message Table {
  // The Arrow data to display
  ArrowData arrow_data = 1;

  // How to show borders around the table and between cells.
  BorderMode border_mode = 2;

  // Available border modes:
  enum BorderMode {
    ALL = 0; // Show borders around the table and between cells.
    NONE = 1; // Show no borders.
    HORIZONTAL = 2; // Show only horizontal borders between rows.
  }

  // Whether to hide the index column(s).
  bool hide_index = 3;

  // Whether to hide the column header row(s).
  bool hide_header = 4;
}
